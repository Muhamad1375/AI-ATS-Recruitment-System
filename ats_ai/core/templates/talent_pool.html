<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent Pool</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
    }

    /* HEADER */
    .header {
        text-align: center;
        padding: 40px 20px;
    }

    .header h1 {
        font-size: 36px;
        margin: 0;
    }

    .header p {
        color: #94a3b8;
        margin-top: 8px;
    }

    /* TABLE CARD */
    .card {
        width: 90%;
        max-width: 1000px;
        margin: 30px auto;
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        padding: 14px;
        text-align: left;
        border-bottom: 1px solid #334155;
    }

    th {
        color: #38bdf8;
        font-size: 14px;
    }

    td {
        color: #e2e8f0;
        font-size: 14px;
    }

    tr:hover {
        background: #0f172a;
    }

    /* BADGES */
    .badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
    }

    .new { background: #2563eb; }
    .reviewed { background: #f59e0b; }
    .interview { background: #38bdf8; }
    .hired { background: #22c55e; }
    .rejected { background: #ef4444; }

</style>
</head>

<body>

<div class="header">
    <h1>Talent Pool</h1>
    <p>AI-ranked candidates based on resume analysis</p>
</div>

<div class="card">

<table>
    <tr>
        <th>Name</th>
        <th>Job</th>
        <th>Final Score</th>
        <th>Status</th>
    </tr>

    {% for c in candidates %}
    <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.job.title }}</td>
        <td>{{ c.final_score }}</td>
        <td>
            <span class="badge {{ c.status }}">
                {{ c.status }}
            </span>
        </td>
    </tr>
    {% endfor %}

</table>

</div>

</body>
</html>
