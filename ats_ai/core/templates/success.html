<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Success</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #1e293b;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        width: 350px;
    }

    h2 {
        margin-bottom: 10px;
        font-size: 26px;
    }

    p {
        color: #94a3b8;
        margin-bottom: 25px;
    }

    a {
        display: inline-block;
        padding: 10px 18px;
        background: #38bdf8;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
    }

    a:hover {
        background: #0ea5e9;
    }

    .check {
        font-size: 50px;
        margin-bottom: 10px;
    }
</style>

</head>

<body>

<div class="card">
    <div class="check">🎉</div>
    <h2>Upload Successful</h2>
    <p>Your resume has been analyzed successfully by AI</p>

    <a href="/">Upload Another Resume</a>
</div>

</body>
</html>
