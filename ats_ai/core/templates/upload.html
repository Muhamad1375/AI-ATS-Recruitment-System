<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume ATS</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
    }

    /* HERO */
    .hero {
        text-align: center;
        padding: 80px 20px 40px;
    }

    .hero h1 {
        font-size: 42px;
        margin-bottom: 10px;
    }

    .hero p {
        color: #94a3b8;
        font-size: 18px;
    }

    /* FORM CARD */
    .card {
        width: 400px;
        margin: 40px auto;
        background: #1e293b;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #38bdf8;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background: #0ea5e9;
    }

    /* FEATURES */
    .features {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 40px;
        flex-wrap: wrap;
    }

    .feature {
        background: #1e293b;
        padding: 15px;
        border-radius: 10px;
        width: 200px;
        text-align: center;
    }

    .feature h3 {
        margin: 10px 0;
        font-size: 16px;
    }

    .feature p {
        color: #94a3b8;
        font-size: 13px;
    }
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>AI Resume Screening System</h1>
    <p>Upload resumes and let AI rank the best candidates automatically</p>
</div>

<!-- FORM -->
<div class="card">
    <h2 style="text-align:center;">Upload Resume</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Full Name">
        <input type="email" name="email" placeholder="Email">

        <select name="job">
            {% for job in jobs %}
                <option value="{{ job.id }}">{{ job.title }}</option>
            {% endfor %}
        </select>

        <input type="file" name="resume">

        <button type="submit">Analyze Resume</button>
    </form>
</div>

<!-- FEATURES -->
<div class="features">

<a href="http://127.0.0.1:8000/dashboard/" style="text-decoration: none; color: inherit;">
    <div class="feature">
        <h3>AI Scoring</h3>
        <p>Automatic resume ranking using NLP</p>
    </div>
</a>

    <div class="feature">
        <h3>Skill Match</h3>
        <p>Find missing and matching skills</p>
    </div>

<a href="http://127.0.0.1:8000/talent-pool/" style="text-decoration: none; color: inherit;">
    <div class="feature">
        <h3>Talent Pool</h3>
        <p>Store and reuse candidates later</p>
    </div>
</a>

</div>

</body>
</html>
